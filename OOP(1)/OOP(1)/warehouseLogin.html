<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteelHub - Warehouse Login</title>
  <link rel="stylesheet" href="warehouse.css" />
</head>
<body>
  <div class="header">
    <h1>STEELHUB</h1>
    <a href="index.html" class="home-btn">Home</a>
  </div>

  <div class="login-container">
    <div class="login-box">
      <h2>Warehouse Login</h2>
      <form action="#" method="POST">
        <div class="form-group">
          <label for="warehouse-email">Email</label>
          <input type="email" id="warehouse-email" name="email" placeholder="Enter your email" required />
        </div>
        <div class="form-group">
          <label for="warehouse-password">Password</label>
          <input type="password" id="warehouse-password" name="password" placeholder="Enter your password" required />
        </div>
        <button type="submit">Login</button>
        <div class="text-center">
          <p>New to SteelHub? <a href="warehouseSignUp.html" class="signup-link">Sign up</a></p>
        </div>
      </form>
    </div>
  </div>

  <script src="warehouse.js"></script>
</body>
</html>
